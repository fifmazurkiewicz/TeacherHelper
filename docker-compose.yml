services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teacher
      POSTGRES_PASSWORD: teacher
      POSTGRES_DB: teacherhelper
    ports:
      - "5432:5432"
    volumes:
      - teacherhelper_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teacher -d teacherhelper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  teacherhelper_pg:
