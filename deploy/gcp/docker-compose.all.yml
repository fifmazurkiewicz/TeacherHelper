# Cały stos na jednej VM: Postgres + Redis + backend + frontend + Caddy.
# Qdrant: zewnętrzny darmowy klaster Qdrant Cloud (.env.all).
# Z katalogu deploy/gcp: docker compose -f docker-compose.all.yml --env-file .env.all up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teacherhelper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: teacherhelper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teacherhelper -d teacherhelper"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://teacherhelper:${POSTGRES_PASSWORD}@postgres:5432/teacherhelper
      DATABASE_URL_SYNC: postgresql+psycopg://teacherhelper:${POSTGRES_PASSWORD}@postgres:5432/teacherhelper
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAPI_DOCS: "false"
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_ROOT: /app/data/storage
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
    volumes:
      - backend_storage:/app/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  backend_storage:
  caddy_data:
  caddy_config:
