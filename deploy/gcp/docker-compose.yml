# PostgreSQL: Cloud SQL (poza Compose). Redis + app na VM (Compute Engine).
# Qdrant: darmowy klaster w Qdrant Cloud — QDRANT_URL + QDRANT_API_KEY w .env.
# Z katalogu deploy/gcp: docker compose --env-file .env up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - backend_storage:/app/data/storage
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_storage:
