# GCP Ścieżka A: Cloud SQL (poza Compose) + Redis + backend + frontend na jednej VM.
# Qdrant: Qdrant Cloud — QDRANT_URL + QDRANT_API_KEY w pliku .env (obok tego katalogu).
# Reverse proxy (Caddy): na hoście VM → http://127.0.0.1:8080 (patrz docs/GCP_KROK_PO_KROKU.md).
#
# Pierwszy start / aktualizacja: docker compose --env-file .env build && docker compose --env-file .env up -d
# Szybki przepływ po git pull: ten sam build + up (sekcja w docs/GCP_KROK_PO_KROKU.md).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - backend_storage:/app/data/storage
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_storage:
